<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>물질의 전기적 성질 시뮬레이션</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            color: #e0e0ff;
            text-shadow: 0 0 10px rgba(100, 150, 255, 0.8);
        }

        .main-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            align-items: flex-start;
        }

        .item-table-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            width: 280px;
            flex-shrink: 0;
        }

        .item-table-container h2 {
            text-align: center;
            font-size: 15px;
            margin-bottom: 10px;
            color: #aad4ff;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 8px;
        }

        .item-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .item-table thead tr th {
            padding: 7px 5px;
            text-align: center;
        }

        .item-table thead th:nth-child(1) {
            color: #ff9966;
            background: rgba(255, 100, 50, 0.2);
            border-radius: 5px 0 0 0;
        }

        .item-table thead th:nth-child(2) {
            color: #66ccff;
            background: rgba(50, 150, 255, 0.2);
            border-radius: 0 5px 0 0;
        }

        .item-table tbody tr {
            cursor: pointer;
            transition: background 0.2s;
        }

        .item-table tbody td {
            padding: 7px 8px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 4px;
        }

        .item-table tbody td:hover {
            background: rgba(255, 255, 255, 0.2) !important;
        }

        .item-table tbody td.conductor { color: #ffcc88; }
        .item-table tbody td.insulator { color: #88ccff; }

        .item-table tbody td.selected-conductor {
            background: rgba(255, 150, 50, 0.4) !important;
            color: #ffaa44;
            font-weight: bold;
        }

        .item-table tbody td.selected-insulator {
            background: rgba(50, 150, 255, 0.4) !important;
            color: #44aaff;
            font-weight: bold;
        }

        .sim-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .info-table-container {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 12px 20px;
            width: 100%;
        }

        .info-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            text-align: center;
        }

        .info-table th {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.1);
            font-size: 13px;
            color: #ccc;
        }

        .info-table td {
            padding: 10px 15px;
            font-size: 15px;
            font-weight: bold;
        }

        .info-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
        }

        .badge-conductor {
            background: rgba(255, 150, 50, 0.3);
            border: 1px solid #ffaa44;
            color: #ffaa44;
        }

        .badge-insulator {
            background: rgba(50, 150, 255, 0.3);
            border: 1px solid #44aaff;
            color: #44aaff;
        }

        .badge-none {
            background: rgba(150, 150, 150, 0.2);
            border: 1px solid #888;
            color: #aaa;
        }

        .canvas-wrapper {
            background: rgba(0, 0, 10, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 10px;
            width: 100%;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 8px;
        }

        .button-row {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        button {
            padding: 12px 35px;
            font-size: 15px;
            font-family: 'Malgun Gothic', sans-serif;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        #startBtn {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #333;
            box-shadow: 0 4px 15px rgba(255, 200, 50, 0.4);
        }

        #startBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 200, 50, 0.6);
        }

        #startBtn:disabled {
            background: linear-gradient(135deg, #555, #777);
            color: #aaa;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #resetBtn {
            background: linear-gradient(135deg, #355c7d, #6c5b7b);
            color: white;
            box-shadow: 0 4px 15px rgba(100, 100, 200, 0.4);
        }

        #resetBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(100, 100, 200, 0.6);
        }

        .description {
            font-size: 12px;
            color: #aaa;
            text-align: center;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 8px 15px;
            width: 100%;
            line-height: 1.6;
        }

        .desc-conductor { color: #ffcc88; }
        .desc-insulator { color: #88ccff; }

        /* ===================== 팝업 스타일 ===================== */
        .popup-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .popup-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .popup-box {
            background: linear-gradient(145deg, #1a1a3e, #0d1b3e);
            border-radius: 20px;
            padding: 0;
            width: 480px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8),
                        0 0 40px rgba(100, 150, 255, 0.15);
            transform: scale(0.85) translateY(20px);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
        }

        .popup-overlay.active .popup-box {
            transform: scale(1) translateY(0);
        }

        .popup-header {
            padding: 20px 25px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .popup-header-conductor {
            background: linear-gradient(135deg,
                rgba(255, 140, 30, 0.35),
                rgba(255, 100, 10, 0.15));
            border-bottom: 1px solid rgba(255, 150, 50, 0.3);
        }

        .popup-header-insulator {
            background: linear-gradient(135deg,
                rgba(50, 120, 255, 0.35),
                rgba(20, 80, 200, 0.15));
            border-bottom: 1px solid rgba(80, 150, 255, 0.3);
        }

        .popup-emoji {
            font-size: 42px;
            line-height: 1;
            filter: drop-shadow(0 0 10px rgba(255,255,200,0.5));
        }

        .popup-title-block {
            flex: 1;
            padding: 0 15px;
        }

        .popup-name {
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }

        .popup-type-badge {
            display: inline-block;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .popup-type-conductor {
            background: rgba(255,150,50,0.25);
            border: 1px solid rgba(255,170,80,0.6);
            color: #ffcc88;
        }

        .popup-type-insulator {
            background: rgba(50,130,255,0.25);
            border: 1px solid rgba(80,160,255,0.6);
            color: #99ccff;
        }

        .popup-close {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #ccc;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            line-height: 1;
            padding: 0;
        }

        .popup-close:hover {
            background: rgba(255,80,80,0.3);
            border-color: rgba(255,100,100,0.5);
            color: #ff8888;
            transform: rotate(90deg);
        }

        .popup-body {
            padding: 20px 25px 25px;
        }

        .popup-section {
            margin-bottom: 16px;
        }

        .popup-section:last-child {
            margin-bottom: 0;
        }

        .popup-section-title {
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-title-conductor { color: #ffaa66; }
        .section-title-insulator { color: #66aaff; }

        .popup-section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }

        .popup-desc {
            font-size: 14px;
            color: #dde;
            line-height: 1.75;
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            padding: 12px 14px;
            border-left: 3px solid;
        }

        .popup-desc-conductor {
            border-left-color: rgba(255,150,50,0.6);
        }

        .popup-desc-insulator {
            border-left-color: rgba(80,150,255,0.6);
        }

        .popup-uses {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .use-chip {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            transition: transform 0.2s;
        }

        .use-chip:hover {
            transform: translateY(-2px);
        }

        .use-chip-conductor {
            background: rgba(255, 140, 30, 0.18);
            border: 1px solid rgba(255, 160, 60, 0.35);
            color: #ffcc99;
        }

        .use-chip-insulator {
            background: rgba(60, 130, 255, 0.18);
            border: 1px solid rgba(80, 160, 255, 0.35);
            color: #99ccff;
        }

        .popup-props {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .prop-item {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
        }

        .prop-label {
            color: #888;
            margin-bottom: 3px;
            font-size: 11px;
        }

        .prop-value {
            font-weight: bold;
            font-size: 13px;
        }

        .prop-value-conductor { color: #ffbb66; }
        .prop-value-insulator { color: #77bbff; }

        .popup-footer {
            padding: 12px 25px 20px;
            text-align: center;
        }

        .popup-confirm-btn {
            padding: 10px 40px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: all 0.25s;
            font-family: 'Malgun Gothic', sans-serif;
            letter-spacing: 0.5px;
        }

        .popup-confirm-conductor {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #333;
            box-shadow: 0 4px 15px rgba(255,200,50,0.35);
        }

        .popup-confirm-conductor:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255,200,50,0.55);
        }

        .popup-confirm-insulator {
            background: linear-gradient(135deg, #2255cc, #4488ff);
            color: #fff;
            box-shadow: 0 4px 15px rgba(80,150,255,0.35);
        }

        .popup-confirm-insulator:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(80,150,255,0.55);
        }
    </style>
</head>
<body>

<h1>⚡ 물질의 전기적 성질 시뮬레이션</h1>

<div class="main-container">
    <div class="item-table-container">
        <h2>🔍 물질 선택표</h2>
        <table class="item-table">
            <thead>
                <tr>
                    <th>⚡ 도체</th>
                    <th>🛡 부도체</th>
                </tr>
            </thead>
            <tbody id="itemTableBody"></tbody>
        </table>
    </div>

    <div class="sim-container">
        <div class="info-table-container">
            <table class="info-table">
                <thead>
                    <tr>
                        <th>선택한 물질</th>
                        <th>전기적 분류</th>
                        <th>전자 상태</th>
                        <th>전기 전도성</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td id="infoName" style="color:#fff">— 선택 안됨 —</td>
                        <td id="infoType"><span class="info-badge badge-none">미선택</span></td>
                        <td id="infoElectron" style="color:#aaa;">—</td>
                        <td id="infoConductivity" style="color:#aaa;">—</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="canvas-wrapper">
            <canvas id="simCanvas" width="620" height="360"></canvas>
        </div>

        <div class="button-row">
            <button id="startBtn" disabled>▶ 실행</button>
            <button id="resetBtn">↺ 초기화</button>
        </div>

        <div class="description">
            <span class="desc-conductor">■ 도체</span>: 자유전자가 원자핵의 구속을 벗어나 자유롭게 이동 → 전류가 잘 흐름 &nbsp;|&nbsp;
            <span class="desc-insulator">■ 부도체</span>: 전자가 원자핵에 강하게 속박되어 이동 불가 → 전류가 흐르지 않음
        </div>
    </div>
</div>

<!-- 팝업 -->
<div class="popup-overlay" id="popupOverlay">
    <div class="popup-box" id="popupBox">
        <div class="popup-header" id="popupHeader">
            <div class="popup-emoji" id="popupEmoji">⚗️</div>
            <div class="popup-title-block">
                <div class="popup-name" id="popupName">물질 이름</div>
                <span class="popup-type-badge" id="popupTypeBadge">도체</span>
            </div>
            <button class="popup-close" id="popupClose">✕</button>
        </div>
        <div class="popup-body">
            <div class="popup-section">
                <div class="popup-section-title" id="popupDescTitle">📖 물질 설명</div>
                <div class="popup-desc" id="popupDesc">설명 내용</div>
            </div>
            <div class="popup-section">
                <div class="popup-section-title" id="popupUsesTitle">🔧 실생활 활용 예시</div>
                <div class="popup-uses" id="popupUses"></div>
            </div>
            <div class="popup-section">
                <div class="popup-section-title" id="popupPropsTitle">📊 물리적 특성</div>
                <div class="popup-props" id="popupProps"></div>
            </div>
        </div>
        <div class="popup-footer">
            <button class="popup-confirm-btn" id="popupConfirmBtn">✔ 이 물질로 시뮬레이션 시작</button>
        </div>
    </div>
</div>

const tbody = document.getElementById('itemTableBody');
for (let i = 0; i < 10; i++) {
    const tr = document.createElement('tr');

    const tdC = document.createElement('td');
    tdC.classList.add('conductor');
    tdC.textContent = conductors[i].emoji + ' ' + conductors[i].name;
    tdC.dataset.type = 'conductor';
    tdC.dataset.index = i;
    tdC.addEventListener('click', () => openPopup('conductor', i, tdC));

    const tdI = document.createElement('td');
    tdI.classList.add('insulator');
    tdI.textContent = insulators[i].emoji + ' ' + insulators[i].name;
    tdI.dataset.type = 'insulator';
    tdI.dataset.index = i;
    tdI.addEventListener('click', () => openPopup('insulator', i, tdI));

    tr.appendChild(tdC);
    tr.appendChild(tdI);
    tbody.appendChild(tr);
}

// ===================== 팝업 =====================
let pendingTd = null;
let pendingType = null;
let pendingIndex = null;

function openPopup(type, index, td) {
    const data = type === 'conductor' ? conductors[index] : insulators[index];
    pendingTd = td;
    pendingType = type;
    pendingIndex = index;

    const isCond = type === 'conductor';

    // 헤더
    const header = document.getElementById('popupHeader');
    header.className = 'popup-header ' + (isCond ? 'popup-header-conductor' : 'popup-header-insulator');
    document.getElementById('popupEmoji').textContent = data.emoji;
    document.getElementById('popupName').textContent = data.name;

    const badge = document.getElementById('popupTypeBadge');
    badge.className = 'popup-type-badge ' + (isCond ? 'popup-type-conductor' : 'popup-type-insulator');
    badge.textContent = isCond ? '⚡ 도체' : '🛡 부도체';

    // 설명
    const descTitle = document.getElementById('popupDescTitle');
    descTitle.className = 'popup-section-title ' + (isCond ? 'section-title-conductor' : 'section-title-insulator');
    const descBox = document.getElementById('popupDesc');
    descBox.className = 'popup-desc ' + (isCond ? 'popup-desc-conductor' : 'popup-desc-insulator');
    descBox.textContent = data.desc;

    // 활용 예시
    const usesTitle = document.getElementById('popupUsesTitle');
    usesTitle.className = 'popup-section-title ' + (isCond ? 'section-title-conductor' : 'section-title-insulator');
    const usesBox = document.getElementById('popupUses');
    usesBox.innerHTML = '';
    data.uses.forEach(use => {
        const chip = document.createElement('span');
        chip.className = 'use-chip ' + (isCond ? 'use-chip-conductor' : 'use-chip-insulator');
        chip.textContent = use;
        usesBox.appendChild(chip);
    });

    // 특성
    const propsTitle = document.getElementById('popupPropsTitle');
    propsTitle.className = 'popup-section-title ' + (isCond ? 'section-title-conductor' : 'section-title-insulator');
    const propsBox = document.getElementById('popupProps');
    propsBox.innerHTML = '';
    data.props.forEach(prop => {
        const item = document.createElement('div');
        item.className = 'prop-item';
        item.innerHTML = `
            <div class="prop-label">${prop.label}</div>
            <div class="prop-value ${isCond ? 'prop-value-conductor' : 'prop-value-insulator'}">${prop.value}</div>
        `;
        propsBox.appendChild(item);
    });

    // 확인 버튼
    const confirmBtn = document.getElementById('popupConfirmBtn');
    confirmBtn.className = 'popup-confirm-btn ' + (isCond ? 'popup-confirm-conductor' : 'popup-confirm-insulator');

    // 오버레이 활성화
    document.getElementById('popupOverlay').classList.add('active');
}

function closePopup() {
    document.getElementById('popupOverlay').classList.remove('active');
}

document.getElementById('popupClose').addEventListener('click', closePopup);

document.getElementById('popupOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('popupOverlay')) closePopup();
});

document.getElementById('popupConfirmBtn').addEventListener('click', () => {
    closePopup();
    if (pendingTd) {
        // 기존 선택 해제
        document.querySelectorAll('.item-table tbody td').forEach(el => {
            el.classList.remove('selected-conductor', 'selected-insulator');
        });
        pendingTd.classList.add(pendingType === 'conductor' ? 'selected-conductor' : 'selected-insulator');
        selectedType = pendingType;
        selectedName = (pendingType === 'conductor' ? conductors : insulators)[pendingIndex].name;
        updateInfoTable(selectedType, selectedName);
        document.getElementById('startBtn').disabled = false;
        stopAnimation();
        initParticles();
        drawStatic();
    }
});

const W = canvas.width;
const H = canvas.height;

// ===================== 정보 표 업데이트 =====================
function updateInfoTable(type, name) {
    document.getElementById('infoName').textContent = name;
    if (type === 'conductor') {
        document.getElementById('infoType').innerHTML = '<span class="info-badge badge-conductor">⚡ 도체</span>';
        document.getElementById('infoElectron').innerHTML = '<span style="color:#ffcc88">자유전자 (Free Electron)</span>';
        document.getElementById('infoConductivity').innerHTML = '<span style="color:#ffaa44">높음 ▲</span>';
    } else {
        document.getElementById('infoType').innerHTML = '<span class="info-badge badge-insulator">🛡 부도체</span>';
        document.getElementById('infoElectron').innerHTML = '<span style="color:#88ccff">속박전자 (Bound Electron)</span>';
        document.getElementById('infoConductivity').innerHTML = '<span style="color:#4488ff">매우 낮음 ▼</span>';
    }
}

// ===================== 파티클 초기화 =====================
function initParticles() {
    particles = [];
    nuclei = [];
    const rows = 4, cols = 6;
    const spacingX = W / (cols + 1);
    const spacingY = (H - 60) / (rows + 1);
    const offsetY = 30;

    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const x = spacingX * (c + 1);
            const y = offsetY + spacingY * (r + 1);
            nuclei.push({ x, y, r: 14 });

            if (selectedType === 'conductor') {
                const count = 2 + Math.floor(Math.random() * 2);
                for (let e = 0; e < count; e++) {
                    const angle = (Math.PI * 2 / count) * e + Math.random() * 0.5;
                    const dist = 25 + Math.random() * 10;
                    particles.push({
                        x: x + Math.cos(angle) * dist,
                        y: y + Math.sin(angle) * dist,
                        vx: (Math.random() - 0.5) * 3.5,
                        vy: (Math.random() - 0.5) * 3.5,
                        free: true, radius: 5, trail: [], color: '#00ffcc'
                    });
                }
            } else {
                const count = 3;
                for (let e = 0; e < count; e++) {
                    const angle = (Math.PI * 2 / count) * e;
                    const orbitR = 22 + Math.random() * 5;
                    particles.push({
                        x: x + Math.cos(angle) * orbitR,
                        y: y + Math.sin(angle) * orbitR,
                        orbitX: x, orbitY: y,
                        orbitR, angle,
                        speed: 0.025 + Math.random() * 0.015,
                        free: false, radius: 4, trail: [], color: '#5599ff'
                    });
                }
            }
        }
    }
}

// ===================== 그리기 함수들 =====================
function drawBackground() {
    if (selectedType === 'conductor') {
        const grad = ctx.createLinearGradient(0, 0, W, H);
        grad.addColorStop(0, 'rgba(30, 20, 0, 0.9)');
        grad.addColorStop(1, 'rgba(50, 30, 0, 0.9)');
        ctx.fillStyle = grad;
    } else if (selectedType === 'insulator') {
        const grad = ctx.createLinearGradient(0, 0, W, H);
        grad.addColorStop(0, 'rgba(0, 10, 30, 0.9)');
        grad.addColorStop(1, 'rgba(0, 20, 50, 0.9)');
        ctx.fillStyle = grad;
    } else {
        ctx.fillStyle = 'rgba(5, 5, 20, 0.95)';
    }
    ctx.fillRect(0, 0, W, H);
}

function drawNuclei() {
    nuclei.forEach(n => {
        const grd = ctx.createRadialGradient(n.x, n.y, 2, n.x, n.y, n.r + 8);
        if (selectedType === 'conductor') {
            grd.addColorStop(0, 'rgba(255, 150, 50, 1)');
            grd.addColorStop(0.6, 'rgba(255, 100, 20, 0.6)');
            grd.addColorStop(1, 'rgba(255, 80, 0, 0)');
        } else {
            grd.addColorStop(0, 'rgba(100, 150, 255, 1)');
            grd.addColorStop(0.6, 'rgba(60, 100, 255, 0.6)');
            grd.addColorStop(1, 'rgba(30, 80, 255, 0)');
        }
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r + 8, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fillStyle = selectedType === 'conductor' ? '#ff9944' : '#5577ff';
        ctx.fill();
        ctx.strokeStyle = selectedType === 'conductor' ? '#ffcc66' : '#aabbff';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.fillStyle = 'white';
        ctx.font = 'bold 13px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('+', n.x, n.y);
    });
}

function drawParticlesStatic() {
    particles.forEach(p => {
        const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius + 4);
        grd.addColorStop(0, p.color);
        grd.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius + 4, 0, Math.PI * 2);
        ctx.fillStyle = grd;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
    });
}

function drawLabel() {
    if (!selectedType) return;
    const label = selectedType === 'conductor'
        ? `⚡ ${selectedName} — 자유전자가 원자핵의 구속을 벗어나 자유롭게 이동합니다`
        : `🛡 ${selectedName} — 전자가 원자핵에 속박되어 궤도를 벗어나지 못합니다`;
    const color = selectedType === 'conductor' ? '#ffcc88' : '#88ccff';
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, H - 38, W, 38);
    ctx.fillStyle = color;
    ctx.font = 'bold 14px Malgun Gothic, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, W / 2, H - 19);
}

function drawStatic() {
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    drawNuclei();
    drawParticlesStatic();
    drawLabel();
}

// ===================== 애니메이션 =====================
function drawElectricField() {
    ctx.save();
    ctx.globalAlpha = 0.18;
    [H * 0.25, H * 0.5, H * 0.75].forEach(y => {
        for (let x = 30; x < W - 30; x += 60) {
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + 40, y);
            ctx.strokeStyle = '#ffcc44';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x + 40, y);
            ctx.lineTo(x + 32, y - 5);
            ctx.lineTo(x + 32, y + 5);
            ctx.closePath();
            ctx.fillStyle = '#ffcc44';
            ctx.fill();
        }
    });
    ctx.restore();
}

function animate() {
    animFrame = requestAnimationFrame(animate);
    time++;
    ctx.clearRect(0, 0, W, H);
    drawBackground();

    if (selectedType === 'conductor') drawElectricField();

    drawNuclei();

    if (selectedType === 'insulator') {
        nuclei.forEach(n => {
            ctx.beginPath();
            ctx.arc(n.x, n.y, 25, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(100, 150, 255, 0.15)';
            ctx.lineWidth = 1;
            ctx.stroke();
        });
    }

    particles.forEach(p => {
        if (p.free) {
            p.x += p.vx;
            p.y += p.vy;
            p.vx += 0.03;
            const speed = Math.sqrt(p.vx ** 2 + p.vy ** 2);
            if (speed > 5) { p.vx = (p.vx / speed) * 5; p.vy = (p.vy / speed) * 5; }
            if (p.x > W + 10) { p.x = -10; p.y = 40 + Math.random() * (H - 80); p.vx = 1.5 + Math.random() * 2; p.vy = (Math.random() - 0.5) * 2; }
            if (p.x < -10) p.x = W + 10;
            if (p.y < 10) p.vy = Math.abs(p.vy);
            if (p.y > H - 45) p.vy = -Math.abs(p.vy);
            p.trail.push({ x: p.x, y: p.y });
            if (p.trail.length > 12) p.trail.shift();
        } else {
            p.angle += p.speed;
            p.x = p.orbitX + Math.cos(p.angle) * p.orbitR;
            p.y = p.orbitY + Math.sin(p.angle) * p.orbitR;
            p.trail.push({ x: p.x, y: p.y });
            if (p.trail.length > 8) p.trail.shift();
        }
    });

    particles.forEach(p => {
        if (p.trail.length > 1) {
            ctx.beginPath();
            ctx.moveTo(p.trail[0].x, p.trail[0].y);
            for (let i = 1; i < p.trail.length; i++) ctx.lineTo(p.trail[i].x, p.trail[i].y);
            ctx.strokeStyle = p.free ? 'rgba(0, 255, 200, 0.3)' : 'rgba(85, 153, 255, 0.25)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }
    });

    drawParticlesStatic();
    drawLabel();
}

// ===================== 버튼 이벤트 =====================
document.getElementById('startBtn').addEventListener('click', () => {
    if (!selectedType || animating) return;
    animating = true;
    initParticles();
    animate();
    document.getElementById('startBtn').disabled = true;
});

document.getElementById('resetBtn').addEventListener('click', () => {
    stopAnimation();
    if (selectedType) {
        initParticles();
        drawStatic();
        document.getElementById('startBtn').disabled = false;
    } else {
        ctx.clearRect(0, 0, W, H);
        drawBackground();
    }
    animating = false;
});

function stopAnimation() {
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    animating = false;
}

// ===================== 초기 화면 =====================
(function drawInit() {
    ctx.fillStyle = 'rgba(5, 5, 20, 0.95)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(200, 200, 255, 0.4)';
    ctx.font = 'bold 18px Malgun Gothic, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('← 왼쪽 표에서 물질을 선택하세요', W / 2, H / 2);
    ctx.font = '14px Malgun Gothic, sans-serif';
    ctx.fillStyle = 'rgba(180,180,220,0.3)';
    ctx.fillText('도체 또는 부도체를 클릭하면 팝업이 나타납니다', W / 2, H / 2 + 30);
})();
</script>
